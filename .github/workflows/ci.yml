name: Frontend CI
on: [push, pull_request]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Check Linting
        run: npm run lint
      - name: TypeScript Compile Check
        run: npx tsc --noEmit
      - name: Run Unit Tests
        run: npm run test
